<!DOCTYPE html>
<html>
<head>
    <title>Extract Practice Points</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { padding: 0; margin: 0; }
        .container { max-width: 1200px; margin: 68px auto 0; padding: 20px; }
        .controls { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 20px; background: var(--card-background); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 500; font-size: 14px; }
        select, button { padding: 8px 12px; font-size: 14px; border-radius: 6px; }
        select { border: 2px solid var(--accent-color); background: var(--input-background); color: var(--text-color); }
        button { background: var(--accent-color); color: white; border: none; cursor: pointer; }
        button:hover { opacity: 0.9; }
        #output { margin-top: 20px; background: var(--card-background); padding: 20px; border-radius: 12px; box-shadow: var(--shadow); }
        pre { background: var(--input-background); padding: 15px; border: 1px solid var(--border-color); overflow-x: auto; border-radius: 6px; font-size: 12px; }
        .loading { color: var(--text-secondary); }
        .error { color: #d00; }
        .success { color: #060; font-weight: 500; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Extract Practice Points</h1>

        <div class="controls">
            <div class="control-group">
                <label for="guidelineSelect">Select Guideline:</label>
                <select id="guidelineSelect">
                    <option value="">Loading guidelines...</option>
                </select>
            </div>
            <button onclick="extractPoints()">Extract Practice Points</button>
        </div>

        <div id="output"></div>
    </div>

    <!-- Firebase initialization -->
    <script type="module">
        import { db, auth } from './firebase-init.js';

        window.db = db;
        window.auth = auth;

        // Load guidelines into dropdown
        async function loadGuidelines() {
            try {
                const { collection, getDocs } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');
                const snap = await getDocs(collection(db, 'guidelines'));
                const select = document.getElementById('guidelineSelect');
                select.innerHTML = '<option value="">-- Select a guideline --</option>';

                snap.docs.forEach(doc => {
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = doc.data().title || doc.id;
                    select.appendChild(option);
                });
            } catch (err) {
                document.getElementById('output').innerHTML =
                    `<div class="error">Error loading guidelines: ${err.message}</div>`;
            }
        }

        // Extract practice points
        window.extractPoints = async function() {
            const guidelineId = document.getElementById('guidelineSelect').value;
            if (!guidelineId) {
                document.getElementById('output').innerHTML =
                    '<div class="error">Please select a guideline</div>';
                return;
            }

            document.getElementById('output').innerHTML = '<div class="loading">Extracting...</div>';

            try {
                const { getDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');
                const snap = await getDoc(doc(db, 'guidelines', guidelineId));
                if (!snap.exists()) throw new Error('Guideline not found');

                const data = snap.data();
                const title = data.title || guidelineId;
                const content = data.content || data.condensed || '(No content)';

                // Get auth token
                const token = await auth.currentUser?.getIdToken();

                // Call extraction API
                const response = await fetch('/api/extractPracticePoints', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token && { 'Authorization': `Bearer ${token}` })
                    },
                    body: JSON.stringify({ guidelineId, title, content })
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);
                const result = await response.json();

                if (!result.success) throw new Error(result.error);

                // Display results
                const points = result.practicePoints || [];
                const output = document.getElementById('output');
                output.innerHTML = `
                    <div class="success">✓ Extracted ${points.length} practice points</div>
                    <h3>${title}</h3>
                    <pre>${JSON.stringify(points, null, 2)}</pre>
                    <p><small>${points.length} points</small></p>
                `;
            } catch (err) {
                document.getElementById('output').innerHTML =
                    `<div class="error">Error: ${err.message}</div>`;
            }
        };

        // Load on startup
        loadGuidelines();
    </script>
</body>
</html>
